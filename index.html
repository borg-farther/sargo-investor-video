<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sargo Investor Overview</title>
  <meta name="description" content="Sargo 30-second investor overview video." />
  <meta property="og:title" content="Sargo Investor Overview" />
  <meta property="og:description" content="A non-custodial P2P ramp for Africa — 30-second investor overview." />
  <meta property="og:type" content="video.other" />
  <meta property="og:video" content="sargo-investor-overview.mp4" />
  <style>
    :root {
      color-scheme: light;
      --ink: #17120f;
      --muted: #5c4d45;
      --paper: #fffaf7;
      --blush: #f4e8e4;
      --ember: #ef5b2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 4vw, 56px);
      background:
        radial-gradient(circle at 82% 18%, rgba(239,91,42,.18), transparent 35%),
        radial-gradient(circle at 14% 86%, rgba(159,53,29,.10), transparent 42%),
        linear-gradient(135deg, var(--paper), var(--blush));
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }
    main {
      width: min(1120px, 100%);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .brand {
      color: var(--ink);
      letter-spacing: .34em;
    }
    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid rgba(239,91,42,.38);
      border-radius: 999px;
      color: #9f351d;
      background: rgba(255,250,247,.46);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ember);
      box-shadow: 0 0 20px rgba(239,91,42,.7);
    }
    .card {
      padding: clamp(12px, 2vw, 20px);
      border: 1px solid rgba(23,18,15,.10);
      border-radius: 30px;
      background: rgba(255,250,247,.55);
      box-shadow: 0 30px 90px rgba(159,53,29,.13);
    }
    video {
      display: block;
      width: 100%;
      border-radius: 22px;
      background: #17120f;
      box-shadow: 0 22px 60px rgba(23,18,15,.16);
    }
    h1 {
      margin: 24px 0 8px;
      font-size: clamp(34px, 5vw, 68px);
      line-height: .96;
      letter-spacing: -.055em;
    }
    p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.35;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--paper);
      text-decoration: none;
      font-weight: 700;
    }
    a.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid rgba(23,18,15,.16);
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <span class="brand">sargo</span>
      <span class="pill"><span class="dot"></span>pre-seed investor overview</span>
    </div>
    <section class="card">
      <video controls playsinline preload="metadata" poster="poster.png">
        <source src="sargo-investor-overview.mp4" type="video/mp4" />
        Your browser does not support MP4 video.
      </video>
      <h1>A non-custodial P2P ramp for Africa.</h1>
      <p>30-second overview for web3 investors: problem, solution, traction, and pre-seed ask.</p>
      <div class="links">
        <a href="sargo-investor-overview.mp4">Open MP4 directly</a>
        <a class="secondary" href="sargo-investor-overview.mp4" download>Download video</a>
      </div>
    </section>
  </main>
</body>
</html>
